name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - "health-insights/**"
      - "session-reflect/**"
      - "domain-intel/**"
      - "youtube-scout/**"
      - "pkos/**"
      - "portfolio-lens/**"
      - "tts-toolkit/**"
      - "podcast-prep/**"
      - "novel-forge/**"
      - "podcast-studio/**"

permissions:
  contents: write

jobs:
  call-reusable:
    uses: n0rvyn/indie-toolkit/.github/workflows/auto-version.yml@workflows/v2
    with:
      plugins: "health-insights session-reflect domain-intel youtube-scout pkos portfolio-lens tts-toolkit podcast-prep novel-forge podcast-studio"
      marketplace_tag_prefix: "personal-os-"
