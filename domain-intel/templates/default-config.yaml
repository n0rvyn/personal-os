# domain-intel configuration
# Generated by /intel setup in the current directory.
#
# NOTE: Interest/preference data (figures, companies, interests) lives in LENS.md
# alongside this file. This file only has technical settings and source URLs.

# Domain names — used for categorization, not filtering.
# Filtering is driven by LENS.md's natural language profile.
domains:
  - name: ai-ml
  - name: ios-development
  # Add more:
  # - name: indie-business
  # - name: web-development

# Data sources — URLs and technical parameters
sources:
  github:
    enabled: true
    languages:
      - swift
      - python
      - typescript
    min_stars: 50

  rss:
    - name: Hacker News AI
      url: https://hnrss.org/newest?q=AI+LLM
    - name: Swift.org Blog
      url: https://www.swift.org/atom.xml
    - name: Apple Developer News
      url: https://developer.apple.com/news/rss/news.rss
    # Add more feeds:
    # - name: Feed Name
    #   url: https://example.com/feed.xml

  # Product Hunt — discover new tools and launches via API.
  # Requires a free API key from https://www.producthunt.com/v2/oauth/applications
  # Leave client_id/client_secret empty to skip Product Hunt collection.
  producthunt:
    enabled: false
    client_id: ""
    client_secret: ""
    # Topic filter — only collect posts matching these PH topics.
    # Empty list = collect all. Use PH topic slugs (lowercase, hyphenated).
    topics:
      - artificial-intelligence
      - developer-tools
    # - productivity
    # - open-source

  # Official sites — changelog/blog pages to monitor
  # NOTE: For companies with multiple pages, use the `companies` section
  # in LENS.md instead (supports paths[] per company).
  # This section is for standalone official sources not tied to tracked companies.
  official:
    - name: Python Releases
      url: https://docs.python.org
      paths:
        - /3/whatsnew/
    # Add more:
    # - name: Source Name
    #   url: https://example.com
    #   paths:
    #     - /changelog
    #     - /blog

  # External sources — pre-analyzed insight files from other plugins.
  # Each external source is a directory containing IEF-compliant .md files.
  # Files are imported during /scan and removed from the source directory after import.
  external: []
  # Example:
  # external:
  #   - name: YouTube Scout
  #     path: ~/.youtube-scout/exports
  #     pre_collect: /youtube-scan   # optional: skill to invoke before importing

# Scan parameters
scan:
  max_items_per_source: 20
  significance_threshold: 2
  # Use Playwright headless browser for JS-rendered pages (SPA sites).
  # Requires: pip install playwright && playwright install chromium
  browser_fallback: false
  # Schedule hint: use CronCreate for automated scans
  # Example: every morning at 8:47am → cron: "47 8 * * *"
  # Cron jobs auto-expire after 3 days — recreate in new sessions

  # Automatically generate a daily digest after scan if new insights were stored.
  # Set to false to keep /scan and /digest as separate steps.
  auto_digest: false
