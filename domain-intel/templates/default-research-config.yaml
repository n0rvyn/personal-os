# Research source configuration
# All sources enabled by default; disable specific ones if not needed.

sources:
  search: true        # General web search (multiple query strategies)
  github: true        # GitHub repos, issues, discussions
  academic: true      # arXiv, Google Scholar
  youtube: true       # YouTube video search
  community: true     # Reddit, Hacker News
  media: true         # Industry media, tech press
  official: true      # Official project/org websites
  institution: true   # Government, NGO, industry bodies

scan:
  max_items_per_source: 30
  significance_threshold: 2
  browser_fallback: false
