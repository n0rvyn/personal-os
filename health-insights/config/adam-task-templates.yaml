# Adam Task Templates — Health Insights
# These templates are consumed by Adam's Bree scheduler.
# The user creates delivery rules via Adam Web UI or API (POST /delivery-rules).
#
# Adam server endpoint: http://localhost:7100
# Auth: x-api-key header (value from ~/.adam/.env ADAM_API_KEY)

templates:
  - name: "health-daily-analyze"
    description: "Daily health analysis and Notion sync"
    schedule: "0 7 * * *"  # 7am daily
    prompt: "/health analyze"
    roleId: null  # uses 钟南山 role
    enabled: true

  - name: "health-weekly-digest"
    description: "Weekly health digest to Get笔记 + IEF export"
    schedule: "0 9 * * 1"  # 9am Monday
    prompt: "/health digest"
    roleId: null
    enabled: true

  - name: "health-predict"
    description: "Daily alert evaluation"
    schedule: "30 7 * * *"  # 7:30am daily (after analyze)
    prompt: "/health predict"
    roleId: null
    enabled: true

  - name: "health-baseline-update"
    description: "Weekly baseline recomputation"
    schedule: "0 8 * * 0"  # 8am Sunday
    prompt: "/health baseline"
    roleId: null
    enabled: true

# Delivery Rule Configuration
# Create these via Adam Web UI or API (POST /delivery-rules).
#
# Rule 1 — Daily summary to WeChat:
#   event: task_complete
#   filter: templateId == "health-daily-analyze"
#   target: WeChat channel
#   skipOriginChannel: true
#
# Rule 2 — Alert push to WeChat:
#   event: task_complete
#   filter: templateId == "health-predict"
#   target: WeChat channel
#   skipOriginChannel: false
#
# Adam API example:
#   curl -X POST http://localhost:7100/delivery-rules \
#     -H "x-api-key: <ADAM_API_KEY>" \
#     -H "Content-Type: application/json" \
#     -d '{
#       "name": "health-alert-to-wechat",
#       "event": "task_complete",
#       "matchCriteria": {"templateId": "health-predict"},
#       "targetChannel": "<wechat_channel_id>",
#       "skipOriginChannel": false,
#       "enabled": true
#     }'
