# Health Insights Plugin — Default Configuration
# All paths are configurable; override in ~/.adam/config/health-insights.yaml

vault_path: "~/Obsidian/HealthVault"
notion_workspace: "Health"
icloud_watch_folder: "~/Library/Mobile Documents/com~apple~CloudDocs/HealthSync/delta/"

# MongoDB Atlas
mongodb:
  connection_string: "${MDB_MCP_CONNECTION_STRING}"
  database: "health"
  batch_size: 1000

# Notion (API key read from NOTION_API_KEY env var)
notion_api_key: "${NOTION_API_KEY}"
notion_database_ids:
  trends: "15cc7d2f-343b-42ef-a905-3fd9f50132fe"
  alerts: "efd8d96c-c304-4e39-8d17-0318fff9669f"
  reports: "a9ffa403-14f1-4af0-9ddb-46665ddab2a2"
  lab_results: "1166a80f-dec2-415e-b160-73cd6100810c"
notion_data_source_ids:
  trends: "606d7965-f3d6-4fd8-9988-0efe145bcca1"
  alerts: "a93a8a73-d9df-4b02-8144-94fc3236c14e"
  reports: "58c63376-628a-43cb-95b0-064ceec22c74"
  lab_results: "dea47308-88e1-42d8-80eb-c8d609a9444c"
notion_workspace_page_id: "33f1bde4-ddac-8182-b4f7-d0488daa834f"
notion_dashboard_page_id: "33f1bde4-ddac-81cc-8140-f6b5820531bb"

# Baseline computation
min_data_points_required: 30
baseline_window_days: 90
drift_threshold_pct: 10

# Alert thresholds
alert_rules:
  hrv_low_days: 3
  hrv_low_deviation_pct: 30
  resting_hr_high_deviation_pct: 15
  sleep_debt_days: 5
  sleep_debt_hours: 6
  blood_glucose_post_threshold: 11
