# Health Insights Plugin — Configuration Schema
# This file documents all configurable fields and their types.

fields:
  vault_path:
    type: string
    description: "Path to the Obsidian HealthVault directory"
    required: true

  notion_workspace:
    type: string
    description: "Name of the Notion workspace for health data"
    default: "Health"

  icloud_watch_folder:
    type: string
    description: "iCloud Drive path watched for new HealthKit delta files"
    default: "~/Library/Mobile Documents/com~apple~CloudDocs/HealthSync/delta/"

  mongodb:
    type: object
    description: "MongoDB Atlas connection configuration"
    properties:
      connection_string:
        type: string
        description: "MongoDB connection string (use ${MDB_MCP_CONNECTION_STRING} env var)"
        default: "${MDB_MCP_CONNECTION_STRING}"
      database:
        type: string
        description: "MongoDB database name"
        default: "health"
      batch_size:
        type: integer
        description: "Batch size for MongoDB writes during ingestion"
        default: 1000

  notion_api_key:
    type: string
    description: "Notion API key (read from NOTION_API_KEY env var)"
    default: "${NOTION_API_KEY}"

  notion_database_ids:
    type: object
    description: "Notion database IDs (populated after first run)"
    properties:
      trends: { type: string, nullable: true }
      alerts: { type: string, nullable: true }
      reports: { type: string, nullable: true }
      lab_results: { type: string, nullable: true }

  min_data_points_required:
    type: integer
    description: "Minimum days of data before computing a baseline"
    default: 30

  baseline_window_days:
    type: integer
    description: "Rolling window size for baseline computation"
    default: 90

  drift_threshold_pct:
    type: integer
    description: "Deviation threshold (%) to trigger baseline rebuild"
    default: 10

  grafana:
    type: object
    description: "Grafana dashboard integration (optional; used by scripts/grafana_dashboard.py)"
    properties:
      url:
        type: string
        description: "Grafana instance base URL (env: GRAFANA_URL)"
        default: "${GRAFANA_URL}"
        required: false
      api_key:
        type: string
        description: "Grafana API key with dashboard write scope (env: GRAFANA_API_KEY)"
        default: "${GRAFANA_API_KEY}"
        required: false
        secret: true
      datasource_uid:
        type: string
        description: "MongoDB datasource UID in Grafana (env: GRAFANA_DS_UID)"
        default: "${GRAFANA_DS_UID}"
        required: false
