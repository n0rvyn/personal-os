# PKOS Task Templates for Adam
# Load via Adam API: POST /task-templates for each entry
# Or import via Adam CLI when available

templates:
  # ═══════ Daily Pipeline ═══════

  - id: pkos-inbox
    name: "PKOS Inbox Monitor"
    description: "Process pending items from Reminders, Notes, and voice files"
    trigger:
      type: cron
      cron: "*/15 * * * *"
    steps:
      - id: process-inbox
        prompt: "/inbox"
    tags: [pkos, inbox, pipeline]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 2.0
      maxTurns: 50
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
          - "~/Library/Mobile Documents"

  - id: pkos-ripple-verify
    name: "PKOS Ripple Verification"
    description: "Verify ripple compilation completed after inbox processing"
    trigger:
      type: event
      event: "template_complete:pkos-inbox"
    steps:
      - id: verify
        prompt: "Read ~/Obsidian/PKOS/.state/ripple-log.yaml. Check the latest entry's date matches today. If the entry shows mocs_updated or mocs_created counts > 0, report success. If no entry for today exists, report that ripple may have been skipped (no knowledge/idea/reference items in this inbox run, which is normal)."
    tags: [pkos, ripple, verify]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 0.3
      maxTurns: 10
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"

  # ═══════ Intel Integration ═══════

  - id: pkos-domain-scan
    name: "PKOS Domain Intel Scan"
    description: "Run domain-intel collection pipeline"
    trigger:
      type: cron
      cron: "0 8,20 * * *"
    steps:
      - id: scan
        prompt: "/scan"
    tags: [pkos, domain-intel, collection]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/domain-intel"]
      maxBudgetUsd: 2.0
      maxTurns: 100

  - id: pkos-youtube-scan
    name: "PKOS YouTube Scan"
    description: "Run youtube-scout curation pipeline"
    trigger:
      type: cron
      cron: "0 12 * * *"
    steps:
      - id: scan
        prompt: "/youtube-scan"
    tags: [pkos, youtube-scout, collection]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/youtube-scout"]
      maxBudgetUsd: 2.0
      maxTurns: 100

  - id: pkos-intel-sync
    name: "PKOS Intel Sync"
    description: "Import new domain-intel insights into PKOS vault with ripple compilation"
    trigger:
      type: event
      event: "template_complete:pkos-domain-scan"
    steps:
      - id: sync
        prompt: "/intel-sync"
    tags: [pkos, intel-sync, ief]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 2.0
      maxTurns: 80
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
          # intel-sync reads insights_path from pkos-config.yaml at runtime

  - id: pkos-intel-sync-yt
    name: "PKOS Intel Sync (YouTube)"
    description: "Import new insights after YouTube scan completes"
    trigger:
      type: event
      event: "template_complete:pkos-youtube-scan"
    steps:
      - id: sync
        prompt: "/intel-sync"
    tags: [pkos, intel-sync, youtube]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 1.5
      maxTurns: 60
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
          # intel-sync reads insights_path from pkos-config.yaml at runtime

  # ═══════ Daily Signals ═══════

  - id: pkos-signal
    name: "PKOS Signal Aggregator"
    description: "Collect behavioral signals from Notion + Obsidian"
    trigger:
      type: cron
      cron: "0 22 * * *"
    steps:
      - id: collect-signals
        prompt: "/signal --days 1"
    tags: [pkos, signal, feedback]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 0.5
      maxTurns: 30

  - id: pkos-digest
    name: "PKOS Daily Digest"
    description: "Generate daily digest for Obsidian"
    trigger:
      type: cron
      cron: "30 7 * * *"
    steps:
      - id: generate-digest
        prompt: "/digest --type daily"
    tags: [pkos, digest, daily]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 0.5
      maxTurns: 30

  # ═══════ Weekly Maintenance ═══════

  - id: pkos-review
    name: "PKOS Weekly Review"
    description: "Generate weekly digest"
    trigger:
      type: cron
      cron: "0 9 * * 0"
    steps:
      - id: weekly-digest
        prompt: "/digest --type weekly"
    tags: [pkos, review, weekly]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 1.0
      maxTurns: 50

  - id: pkos-lint
    name: "PKOS Wiki Lint"
    description: "Health check the knowledge wiki — orphans, broken links, stale notes, contradictions"
    trigger:
      type: event
      event: "template_complete:pkos-review"
    steps:
      - id: lint
        prompt: "/lint --report-only"
    tags: [pkos, lint, health]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 1.0
      maxTurns: 50
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"

  - id: pkos-serendipity
    name: "PKOS Serendipity Discovery"
    description: "Find unexpected cross-domain connections in knowledge graph"
    trigger:
      type: cron
      cron: "0 10 * * 0"
    steps:
      - id: discover
        prompt: "/serendipity --count 5"
    tags: [pkos, serendipity, weekly]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 1.0
      maxTurns: 50

  - id: pkos-evolve
    name: "PKOS Profile Evolution"
    description: "Generate LENS/FOCUS update suggestions from weekly signals"
    trigger:
      type: event
      event: "template_complete:pkos-lint"
    steps:
      - id: evolve
        prompt: "/evolve --days 7"
    tags: [pkos, evolve, feedback]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 0.5
      maxTurns: 30

  # ═══════ Get笔记 Integration ═══════

  - id: pkos-getnote-inbox
    name: "PKOS Inbox — Get笔记 Source"
    description: "PKOS inbox — Get笔记 source (双向读写 + 语义召回)"
    trigger:
      type: cron
      cron: "0 */6 * * *"
    steps:
      - id: process-inbox
        prompt: "/inbox --source getnote"
    tags: [pkos, inbox, getnote]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 2.0
      maxTurns: 50
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
          - "~/Library/Mobile Documents"
    env:
      GETNOTE_API_KEY: "{{getnote_api.api_key}}"
      GETNOTE_CLIENT_ID: "{{getnote_api.client_id}}"

  - id: pkos-getnote-intel-blogger
    name: "PKOS Get笔记 Intel — Blogger"
    description: "Get笔记 博主订阅情报摄取"
    trigger:
      type: cron
      cron: "0 */4 * * *"
    steps:
      - id: intel-bloggers
        prompt: "/intel --source blogger"
    tags: [pkos, getnote, intel, blogger]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 2.0
      maxTurns: 60
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
    env:
      GETNOTE_API_KEY: "{{getnote_api.api_key}}"
      GETNOTE_CLIENT_ID: "{{getnote_api.client_id}}"

  - id: pkos-getnote-intel-live
    name: "PKOS Get笔记 Intel — Live"
    description: "Get笔记 直播订阅情报摄取"
    trigger:
      type: cron
      cron: "0 9 * * *"
    steps:
      - id: intel-lives
        prompt: "/intel --source live"
    tags: [pkos, getnote, intel, live]
    config:
      plugins: ["/Users/norvyn/Code/Skills/indie-toolkit/pkos"]
      maxBudgetUsd: 2.0
      maxTurns: 60
      fileAccess:
        allowedPaths:
          - "~/Obsidian/PKOS"
    env:
      GETNOTE_API_KEY: "{{getnote_api.api_key}}"
      GETNOTE_CLIENT_ID: "{{getnote_api.client_id}}"
