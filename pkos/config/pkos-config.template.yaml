# PKOS Configuration
# Copy this file to ~/.claude/pkos/config.yaml and customize.

# External intelligence source integration
intel_sources:
  domain_intel:
    # REQUIRED: path to your domain-intel workspace's insights/ directory
    # This is {WD}/insights where WD is the directory you run /scan from
    # Example: ~/Code/InfoHub/insights
    insights_path: ""
    # Only import insights with significance >= this threshold
    significance_threshold: 3
    # Source identifier used in PKOS frontmatter
    source_name: domain-intel
    # Maximum insights to import per sync run (prevents ripple overload)
    max_per_sync: 20

  session_reflect:
    insights_path: ~/.claude/session-reflect/insights/
    significance_threshold: 3
    max_per_sync: 20
    category: pattern
    source_name: session-reflect

# Ripple compilation settings
ripple:
  # Minimum notes with same topic before auto-creating a MOC
  moc_creation_threshold: 3
  # Maximum cross-references to add per ripple run
  max_cross_refs_per_run: 40

# Get笔记 API integration
getnote_api:
  # REQUIRED: API key from https://www.biji.com/openapi
  api_key: ""
  # REQUIRED: Client ID from https://www.biji.com/openapi
  client_id: ""
  # Base URL (do not change unless API endpoint changes)
  base_url: "https://openapi.biji.com/open/api/v1"
  # Maximum recall results per inbox run (API max: 10)
  max_recall_results: 10
  # Include non-NOTE types in recall results (BLOGGER, LIVE, URL, DEDAO)
  include_external_types: false
  # Default: use tag-based sync (#pkos-synced marker)
  sync_mode: "tag"   # "tag" | "cursor"
  # Intelligence feed settings
  intel:
    # 每轮最多处理的新内容数（防止一次涌入太多）
    max_new_per_run: 20
    # 内容深度：summary（只 AI 摘要）| full（完整原文）
    content_depth: summary
    # 目标 Obsidian 目录
    obsidian_path: "50-References"
  # Topic map: tag → topic_id for batch_add_to_topic
  topic_map: {}

# Lint settings
lint:
  # Days after which a seed note is considered stale
  stale_threshold_days: 180

# Product Lens Notion projection
product_lens_notion:
  enabled: false
  # Notion database for product-lens project/feature summary rows
  database_id: ""
