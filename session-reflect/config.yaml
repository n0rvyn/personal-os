# session-reflect configuration

# Storage
storage_dir: ~/.claude/session-reflect/

# Session filtering — path-prefix matching against project_path path components
# Default excludes .adam (AI agent automation, not real human sessions).
excluded_projects:
  - .adam

# DEPRECATED — old ignore_patterns substring-on-dirname matching kept readable
# for one release cycle. Will be removed in a future version. Use excluded_projects above.
# ignore_patterns:
#   - adam-roles

# PKOS IEF export
# Default resolved at runtime as: {exchange_dir}/session-reflect/{YYYY-MM}/
# (loaded from ~/.claude/personal-os.yaml). Override explicitly here if needed.
# Leave empty string to use the runtime-resolved default.
insights_path: ""
significance_threshold: 3
max_insights_per_export: 20

# Analysis
include_codex: true
auto_summary: true
