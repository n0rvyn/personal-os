# youtube-scout configuration
# Place at ~/.youtube-scout/config.yaml

scan:
  topic: "AI"
  # Additional topics (future):
  # topics:
  #   - AI
  #   - indie-dev

export:
  # Where to write IEF insight files for cross-plugin consumption.
  # Leave empty to resolve at runtime to {exchange_dir}/youtube-scout/YYYY-MM/
  # ({exchange_dir} loaded from ~/.claude/personal-os.yaml).
  path: ""
  # Minimum weighted_total score to export (1.0 - 5.0)
  min_score: 3.0
  # Domain list for category matching (passed to video-scorer)
  # Match these to your domain-intel config domains for best convergence detection
  domains:
    - ai-ml
    # - ios-development
    # - web-development
